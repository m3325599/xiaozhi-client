name: Docker Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "要发布的版本号（不带 'v' 前缀，例如：1.2.3）"
        required: false
        type: string
      branch:
        description: "发布源分支"
        required: true
        default: "main"
        type: choice
        options:
          - main
          - beta
      force_latest:
        description: "强制更新 latest 标签（即使是 beta 版本）"
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - '.github/workflows/docker-publish.yml'
      - 'docker/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'src/**'

permissions:
  contents: write

jobs:
  docker-release:
    name: Docker 发布
    runs-on: ubuntu-latest
    steps:
      - name: 设置变量（兼容两种触发方式）
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "branch=${{ github.event.inputs.branch }}" >> $GITHUB_OUTPUT
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "force_latest=${{ github.event.inputs.force_latest }}" >> $GITHUB_OUTPUT
          else
            echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "version=" >> $GITHUB_OUTPUT
            echo "force_latest=true" >> $GITHUB_OUTPUT
          fi

      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.vars.outputs.branch }}
          fetch-depth: 0

      - name: 确认触发方式和分支
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "手动触发 Docker 发布，从分支 ${{ steps.vars.outputs.branch }} 发布"
          else
            echo "通过推送触发 Docker 发布，从分支 ${{ steps.vars.outputs.branch }} 发布"
          fi
          echo "指定版本: ${{ steps.vars.outputs.version || '自动获取' }}"
          echo "强制更新 latest: ${{ steps.vars.outputs.force_latest }}"

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.1

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: 清理可能损坏的依赖缓存
        run: |
          rm -rf node_modules
          rm -rf ~/.npm
          rm -rf ~/.pnpm-store
          echo "已清理 node_modules 和缓存"

      - name: 安装依赖（包含 optional dependencies）
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmmirror.com
        run: |
          # 配置 pnpm 使用国内镜像
          pnpm config set registry https://registry.npmmirror.com
          echo "已配置 pnpm 使用国内镜像源"
          
          # 显示 pnpm 版本和配置
          pnpm --version
          pnpm config list
          
          # 批准必要的构建脚本
          echo "========================================"
          echo "批准构建脚本..."
          echo "========================================"
          pnpm config set allowBuilds."@discordjs/opus" true
          pnpm config set allowBuilds."@biomejs/biome" true
          pnpm config set allowBuilds."esbuild" true
          pnpm config set allowBuilds."sharp" true
          echo "已批准所有构建脚本"
          
          # 第一步：安装基础依赖（不包含 optional）
          echo "========================================"
          echo "步骤 1: 安装基础依赖..."
          echo "========================================"
          if ! pnpm install --ignore-scripts=false; then
            echo "✗ 基础依赖安装失败"
            exit 1
          fi
          echo "✓ 基础依赖安装成功"
          
          # 第二步：安装 optional dependencies
          echo "========================================"
          echo "步骤 2: 安装 optional dependencies..."
          echo "========================================"
          # 重试机制：最多重试 3 次
          for i in 1 2 3; do
            echo "尝试安装 optional dependencies (第 $i 次)..."
            if pnpm install --optional --ignore-scripts=false 2>&1 | tee /tmp/pnpm_optional.log; then
              echo "✓ Optional dependencies 安装成功"
              exit 0
            else
              echo "✗ 第 $i 次尝试失败"
              echo "最后 50 行日志:"
              tail -n 50 /tmp/pnpm_optional.log
              echo "等待 10 秒后重试..."
              sleep 10
            fi
          done
          echo "✗ Optional dependencies 安装失败，已重试 3 次"
          exit 1

      - name: 强制重新安装 rolldown binding
        run: |
          # 删除可能损坏的 rolldown binding
          rm -rf node_modules/.pnpm/@rolldown
          
          # 重新安装 rolldown 及其 binding（使用 -w 标志安装到工作区根目录）
          pnpm add -w rolldown@1.0.0-rc.16 @rolldown/binding-linux-x64-gnu@1.0.0-rc.16
          
          # 验证安装
          node -e "try { require('rolldown'); console.log('✓ rolldown 加载成功'); } catch(e) { console.log('✗ rolldown 加载失败:', e.message); }"

      # 构建所有项目
      - name: 构建项目
        run: pnpm run build

      - name: 获取版本号
        id: get_version
        run: |
          if [ -n "${{ steps.vars.outputs.version }}" ]; then
            # 手动指定版本号
            VERSION="${{ steps.vars.outputs.version }}"
            echo "使用手动指定的版本号: $VERSION"
          else
            # 从 package.json 自动获取版本号
            VERSION=$(node -p "require('./package.json').version")
            echo "从 package.json 获取版本号: $VERSION"
          fi

          # 生成带 v 前缀的版本号用于 Docker 标签
          VERSION_WITH_V="v$VERSION"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_with_v=$VERSION_WITH_V" >> $GITHUB_OUTPUT
          echo "Docker 发布版本: $VERSION_WITH_V"

      - name: 确定分支类型
        id: branch_info
        run: |
          if [ "${{ steps.vars.outputs.branch }}" = "main" ]; then
            echo "branch_type=stable" >> $GITHUB_OUTPUT
            echo "is_main_branch=true" >> $GITHUB_OUTPUT
            echo "分支类型: stable (main)"
          else
            echo "branch_type=beta" >> $GITHUB_OUTPUT
            echo "is_main_branch=false" >> $GITHUB_OUTPUT
            echo "分支类型: beta"
          fi

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: 生成 Docker 标签
        id: docker_tags
        run: |
          USERNAME="${{ secrets.DOCKER_USERNAME }}"
          VERSION="${{ steps.get_version.outputs.version }}"
          VERSION_WITH_V="${{ steps.get_version.outputs.version_with_v }}"
          BRANCH_TYPE="${{ steps.branch_info.outputs.branch_type }}"
          IS_MAIN="${{ steps.branch_info.outputs.is_main_branch }}"
          FORCE_LATEST="${{ steps.vars.outputs.force_latest }}"

          # 基础标签：版本号（带 v 前缀）和分支类型
          TAGS="$USERNAME/xiaozhi-client:$VERSION_WITH_V,$USERNAME/xiaozhi-client:$BRANCH_TYPE"

          # 如果是 main 分支或强制更新 latest，添加 latest 标签
          if [ "$IS_MAIN" = "true" ] || [ "$FORCE_LATEST" = "true" ]; then
            TAGS="$TAGS,$USERNAME/xiaozhi-client:latest"
          fi

          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "生成的 Docker 标签:"
          echo "$TAGS" | tr ',' '\n' | sed 's/^/  - /'

      - name: 构建 Docker 镜像（不推送，先测试）
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ steps.docker_tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 测试 Docker 镜像
        continue-on-error: true
        run: |
          echo "📝 开始测试 Docker 镜像..."
          
          # 运行容器测试
          CONTAINER_NAME="xiaozhi-test"
          IMAGE_NAME="${{ secrets.DOCKER_USERNAME }}/xiaozhi-client:${{ steps.get_version.outputs.version_with_v }}"
          
          # 创建临时目录用于测试
          mkdir -p /tmp/xiaozhi-test
          
          # 运行容器（后台模式）
          echo "启动测试容器..."
          docker run -d --name $CONTAINER_NAME \
            -v /tmp/xiaozhi-test:/workspaces \
            $IMAGE_NAME
          
          # 等待容器启动
          echo "等待容器启动..."
          sleep 10
          
          # 检查容器状态
          echo "检查容器状态..."
          CONTAINER_STATUS=$(docker inspect --format='{{.State.Status}}' $CONTAINER_NAME 2>/dev/null || echo "not_found")
          echo "容器状态: $CONTAINER_STATUS"
          
          # 查看容器日志
          echo "=== 容器日志 ==="
          docker logs $CONTAINER_NAME
          echo "=== 容器日志结束 ==="
          
          # 测试 xiaozhi 命令（如果容器在运行）
          if [ "$CONTAINER_STATUS" == "running" ]; then
            echo "测试 xiaozhi 命令..."
            docker exec $CONTAINER_NAME xiaozhi --version || true
          fi
          
          # 停止并删除测试容器
          echo "清理测试容器..."
          docker rm -f $CONTAINER_NAME 2>/dev/null || true
          
          echo "📝 Docker 镜像测试完成"
          
          # 如果容器没有正常运行，给出警告但不阻止发布
          if [ "$CONTAINER_STATUS" != "running" ]; then
            echo "⚠️  警告：容器未能保持运行状态，但继续发布流程"
          fi

      - name: 构建并推送 Docker 镜像（正式推送）
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 发布总结
        run: |
          echo "🎉 Docker 镜像发布完成！"
          echo ""
          echo "📦 发布信息:"
          echo "  版本号: ${{ steps.get_version.outputs.version_with_v }}"
          echo "  分支: ${{ github.event.inputs.branch }}"
          echo "  分支类型: ${{ steps.branch_info.outputs.branch_type }}"
          echo ""
          echo "🏷️ Docker 标签:"
          echo "${{ steps.docker_tags.outputs.tags }}" | tr ',' '\n' | sed 's/^/  - /'
          echo ""
          echo "🚀 使用方法:"
          echo "  docker pull ${{ secrets.DOCKER_USERNAME }}/xiaozhi-client:${{ steps.get_version.outputs.version_with_v }}"
          echo "  docker run -it ${{ secrets.DOCKER_USERNAME }}/xiaozhi-client:${{ steps.get_version.outputs.version_with_v }}"
